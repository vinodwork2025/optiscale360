<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="AI search traffic converts at 14.2% vs Google organic at 2.8%">
    <defs>
        <linearGradient id="c-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="55%" stop-color="#1E3A8A"/>
            <stop offset="100%" stop-color="#1D4ED8"/>
        </linearGradient>
        <linearGradient id="c-left" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E293B"/>
            <stop offset="100%" stop-color="#2D3F55"/>
        </linearGradient>
        <linearGradient id="c-right" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E3A8A"/>
            <stop offset="100%" stop-color="#2563EB"/>
        </linearGradient>
        <linearGradient id="c-gold" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#F59E0B"/>
            <stop offset="100%" stop-color="#FBBF24"/>
        </linearGradient>
        <radialGradient id="c-glow" cx="68%" cy="35%" r="55%">
            <stop offset="0%" stop-color="rgba(59,130,246,0.18)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>
        <filter id="c-glow-f">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="800" height="420" fill="url(#c-bg)"/>
    <rect width="800" height="420" fill="url(#c-glow)"/>

    <!-- Panels -->
    <rect x="32" y="58" width="318" height="308" rx="14" fill="url(#c-left)" opacity="0.72"/>
    <rect x="450" y="58" width="318" height="308" rx="14" fill="url(#c-right)" opacity="0.88"/>

    <!-- Top headline -->
    <text x="400" y="38" font-family="'Space Grotesk','Inter',sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle">Which traffic channel actually grows your business?</text>

    <!-- 5x badge -->
    <rect x="620" y="14" width="158" height="26" rx="13" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.35)" stroke-width="1"/>
    <text x="699" y="31" font-family="'Space Grotesk','Inter',sans-serif" font-size="10" font-weight="700" fill="#F59E0B" text-anchor="middle" letter-spacing="0.5">5x MORE CUSTOMERS</text>

    <!-- LEFT label -->
    <text x="191" y="96" font-family="'Space Grotesk','Inter',sans-serif" font-size="10" font-weight="600" fill="#94A3B8" text-anchor="middle" letter-spacing="2.5">GOOGLE ORGANIC</text>

    <!-- Google big number -->
    <text x="191" y="218" font-family="'Space Grotesk','Inter',sans-serif" font-size="74" font-weight="800" fill="#4B5563" text-anchor="middle">2.8%</text>
    <text x="191" y="242" font-family="'Inter',sans-serif" font-size="11" fill="#6B7280" text-anchor="middle" letter-spacing="0.5">conversion rate</text>

    <!-- Google outcome -->
    <rect x="96" y="262" width="190" height="26" rx="7" fill="rgba(255,255,255,0.05)"/>
    <text x="191" y="279" font-family="'Inter',sans-serif" font-size="10.5" fill="#6B7280" text-anchor="middle">100 clicks → 3 customers</text>
    <text x="191" y="328" font-family="'Inter',sans-serif" font-size="10" fill="#475569" text-anchor="middle">Visitors browse. Most leave.</text>

    <!-- RIGHT label -->
    <text x="609" y="96" font-family="'Space Grotesk','Inter',sans-serif" font-size="10" font-weight="600" fill="#93C5FD" text-anchor="middle" letter-spacing="2.5">AI SEARCH</text>

    <!-- AI big number (gold) -->
    <text x="609" y="218" font-family="'Space Grotesk','Inter',sans-serif" font-size="74" font-weight="800" fill="url(#c-gold)" text-anchor="middle" filter="url(#c-glow-f)">14.2%</text>
    <text x="609" y="242" font-family="'Inter',sans-serif" font-size="11" fill="#93C5FD" text-anchor="middle" letter-spacing="0.5">conversion rate</text>

    <!-- AI outcome -->
    <rect x="514" y="262" width="190" height="26" rx="7" fill="rgba(245,158,11,0.1)"/>
    <text x="609" y="279" font-family="'Inter',sans-serif" font-size="10.5" fill="#FCD34D" text-anchor="middle">100 clicks → 14 customers</text>
    <text x="609" y="328" font-family="'Inter',sans-serif" font-size="10" fill="#93C5FD" text-anchor="middle">Already trusted. Ready to buy.</text>

    <!-- VS badge -->
    <circle cx="400" cy="210" r="32" fill="#0F172A" stroke="rgba(245,158,11,0.4)" stroke-width="1.5"/>
    <text x="400" y="216" font-family="'Space Grotesk','Inter',sans-serif" font-size="13" font-weight="800" fill="#F59E0B" text-anchor="middle">VS</text>

    <!-- Bottom source -->
    <text x="400" y="406" font-family="'Inter',sans-serif" font-size="9.5" fill="rgba(255,255,255,0.28)" text-anchor="middle">2025 Industry Data — optiscaleadvisors.com</text>
</svg>
